AWSTemplateFormatVersion: '2010-09-09'
Description: 'Chili Cook-Off Voting Application - GitHub Direct Deploy'

Parameters:
  GitHubRepo:
    Type: String
    Default: jersilve/chili-cookoff-voting-app
    Description: GitHub repository (owner/repo)
  
  GitHubBranch:
    Type: String
    Default: main
    Description: GitHub branch to deploy from

Resources:
  # VPC and Networking (same as before)
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ChiliCookoffVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ChiliCookoffIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ChiliCookoffALBSG
      GroupDescription: Security group for Chili Cookoff ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ChiliCookoffALBSG

  # DynamoDB Table
  ChiliCookoffData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChiliCookoffData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: EntityType
          AttributeType: S
        - AttributeName: EntityId
          AttributeType: S
      KeySchema:
        - AttributeName: EntityType
          KeyType: HASH
        - AttributeName: EntityId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChiliCookoffVotingApp

  # IAM Role for Lambda Functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ChiliCookoffLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ChiliCookoffData.Arn

  # IAM Role for Code Updater Lambda
  CodeUpdaterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ChiliCookoffCodeUpdaterRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaUpdateAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ChiliCookoff*'

  # Code Updater Lambda - Downloads code from GitHub and updates Lambda functions
  CodeUpdaterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffCodeUpdater
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt CodeUpdaterRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import urllib.request
          import urllib.error
          import boto3
          import zipfile
          import io
          import os
          import cfnresponse
          
          lambda_client = boto3.client('lambda')
          
          def lambda_handler(event, context):
              print(f"Event: {json.dumps(event)}")
              
              try:
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  if request_type in ['Create', 'Update']:
                      github_repo = event['ResourceProperties']['GitHubRepo']
                      github_branch = event['ResourceProperties']['GitHubBranch']
                      
                      print(f"Downloading code from GitHub: {github_repo} @ {github_branch}")
                      
                      # Download and update each Lambda function
                      functions = [
                          ('ChiliCookoffSetupHandler', 'lambda/setup_handler.py', 'setup_handler'),
                          ('ChiliCookoffVoteHandler', 'lambda/vote_handler.py', 'vote_handler'),
                          ('ChiliCookoffLeaderboardHandler', 'lambda/leaderboard_handler.py', 'leaderboard_handler'),
                          ('ChiliCookoffStaticHandler', 'lambda/static_handler.py', 'static_handler')
                      ]
                      
                      for function_name, handler_path, handler_module in functions:
                          update_lambda_from_github(function_name, handler_path, handler_module, github_repo, github_branch)
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'Message': 'Lambda functions updated successfully from GitHub'
                      })
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Message': str(e)
                  })
          
          def update_lambda_from_github(function_name, handler_path, handler_module, github_repo, github_branch):
              """Download code from GitHub and update Lambda function"""
              print(f"Updating {function_name}...")
              
              # Create zip file in memory
              zip_buffer = io.BytesIO()
              
              with zipfile.ZipFile(zip_buffer, 'w', zipfile.ZIP_DEFLATED) as zip_file:
                  # Download main handler file
                  handler_url = f"https://raw.githubusercontent.com/{github_repo}/{github_branch}/{handler_path}"
                  handler_code = download_file(handler_url)
                  zip_file.writestr(f"{handler_module}.py", handler_code)
                  
                  # Download security_utils.py (needed by all handlers)
                  security_utils_url = f"https://raw.githubusercontent.com/{github_repo}/{github_branch}/lambda/security_utils.py"
                  security_utils_code = download_file(security_utils_url)
                  zip_file.writestr("security_utils.py", security_utils_code)
                  
                  # For static handler, download HTML/CSS files
                  if function_name == 'ChiliCookoffStaticHandler':
                      static_files = [
                          'web/setup.html',
                          'web/vote.html',
                          'web/leaderboard.html',
                          'web/styles.css'
                      ]
                      for static_file in static_files:
                          file_url = f"https://raw.githubusercontent.com/{github_repo}/{github_branch}/{static_file}"
                          file_content = download_file(file_url)
                          filename = os.path.basename(static_file)
                          zip_file.writestr(f"static/{filename}", file_content)
              
              # Update Lambda function
              zip_buffer.seek(0)
              lambda_client.update_function_code(
                  FunctionName=function_name,
                  ZipFile=zip_buffer.read()
              )
              
              print(f"Updated {function_name} successfully")
          
          def download_file(url):
              """Download file from URL"""
              try:
                  with urllib.request.urlopen(url) as response:
                      return response.read().decode('utf-8')
              except urllib.error.HTTPError as e:
                  raise Exception(f"Failed to download {url}: {e.code} {e.reason}")

  # Lambda Functions (with placeholder code)
  SetupLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffSetupHandler
      Runtime: python3.11
      Handler: setup_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Setup handler - will be updated from GitHub'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  VoteLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffVoteHandler
      Runtime: python3.11
      Handler: vote_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Vote handler - will be updated from GitHub'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  LeaderboardLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffLeaderboardHandler
      Runtime: python3.11
      Handler: leaderboard_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Leaderboard handler - will be updated from GitHub'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  StaticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffStaticHandler
      Runtime: python3.11
      Handler: static_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Static handler - will be updated from GitHub'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  # Custom Resource to trigger code update from GitHub
  CodeUpdateTrigger:
    Type: Custom::CodeUpdater
    DependsOn:
      - SetupLambdaFunction
      - VoteLambdaFunction
      - LeaderboardLambdaFunction
      - StaticLambdaFunction
    Properties:
      ServiceToken: !GetAtt CodeUpdaterFunction.Arn
      GitHubRepo: !Ref GitHubRepo
      GitHubBranch: !Ref GitHubBranch

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ChiliCookoffALB
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  # Target Groups
  SetupTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: SetupLambdaInvokePermission
    Properties:
      Name: ChiliCookoffSetupTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt SetupLambdaFunction.Arn

  VoteTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: VoteLambdaInvokePermission
    Properties:
      Name: ChiliCookoffVoteTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt VoteLambdaFunction.Arn

  LeaderboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LeaderboardLambdaInvokePermission
    Properties:
      Name: ChiliCookoffLeaderboardTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt LeaderboardLambdaFunction.Arn

  StaticTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: StaticLambdaInvokePermission
    Properties:
      Name: ChiliCookoffStaticTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt StaticLambdaFunction.Arn

  # ALB Listener and Rules
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref StaticTargetGroup

  SetupListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /api/setup
      Actions:
        - Type: forward
          TargetGroupArn: !Ref SetupTargetGroup

  VoteListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values:
            - /api/vote
      Actions:
        - Type: forward
          TargetGroupArn: !Ref VoteTargetGroup

  LeaderboardListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values:
            - /api/leaderboard
      Actions:
        - Type: forward
          TargetGroupArn: !Ref LeaderboardTargetGroup

  StaticListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 4
      Conditions:
        - Field: path-pattern
          Values:
            - /static/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref StaticTargetGroup

  # Lambda Invoke Permissions
  SetupLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SetupLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  VoteLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VoteLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  LeaderboardLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LeaderboardLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  StaticLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StaticLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

Outputs:
  ALBURL:
    Description: Application Load Balancer URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-ALBURL'
  
  SetupURL:
    Description: Setup page URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}/static/setup.html'
  
  VotingURL:
    Description: Voting page URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}/static/vote.html'
  
  LeaderboardURL:
    Description: Leaderboard page URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}/static/leaderboard.html'
  
  GitHubRepo:
    Description: GitHub repository used for deployment
    Value: !Ref GitHubRepo
  
  GitHubBranch:
    Description: GitHub branch used for deployment
    Value: !Ref GitHubBranch
