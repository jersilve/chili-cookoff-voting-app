AWSTemplateFormatVersion: '2010-09-09'
Description: 'Chili Cook-Off Voting Application Infrastructure'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ChiliCookoffVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ChiliCookoffIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ChiliCookoffPublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ChiliCookoffALBSG
      GroupDescription: Security group for Chili Cookoff ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ChiliCookoffALBSG

  ChiliCookoffData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChiliCookoffData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: EntityType
          AttributeType: S
        - AttributeName: EntityId
          AttributeType: S
      KeySchema:
        - AttributeName: EntityType
          KeyType: HASH
        - AttributeName: EntityId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChiliCookoffVotingApp
        - Key: Environment
          Value: Production

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ChiliCookoffLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ChiliCookoffData.Arn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  SetupLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffSetupHandler
      Runtime: python3.11
      Handler: setup_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Setup handler placeholder'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  VoteLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffVoteHandler
      Runtime: python3.11
      Handler: vote_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Vote handler placeholder'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  LeaderboardLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffLeaderboardHandler
      Runtime: python3.11
      Handler: leaderboard_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Leaderboard handler placeholder'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  StaticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffStaticHandler
      Runtime: python3.11
      Handler: static_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Static handler placeholder'}
      Environment:
        Variables:
          TABLE_NAME: !Ref ChiliCookoffData

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ChiliCookoffALB
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  SetupTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: SetupLambdaInvokePermission
    Properties:
      Name: ChiliCookoffSetupTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt SetupLambdaFunction.Arn

  VoteTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: VoteLambdaInvokePermission
    Properties:
      Name: ChiliCookoffVoteTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt VoteLambdaFunction.Arn

  LeaderboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LeaderboardLambdaInvokePermission
    Properties:
      Name: ChiliCookoffLeaderboardTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt LeaderboardLambdaFunction.Arn

  StaticTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: StaticLambdaInvokePermission
    Properties:
      Name: ChiliCookoffStaticTG
      TargetType: lambda
      Targets:
        - Id: !GetAtt StaticLambdaFunction.Arn

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref StaticTargetGroup

  SetupListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /api/setup
      Actions:
        - Type: forward
          TargetGroupArn: !Ref SetupTargetGroup

  VoteListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values:
            - /api/vote
      Actions:
        - Type: forward
          TargetGroupArn: !Ref VoteTargetGroup

  LeaderboardListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values:
            - /api/leaderboard
      Actions:
        - Type: forward
          TargetGroupArn: !Ref LeaderboardTargetGroup

  StaticListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 4
      Conditions:
        - Field: path-pattern
          Values:
            - /static/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref StaticTargetGroup

  SetupLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SetupLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  VoteLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VoteLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  LeaderboardLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LeaderboardLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  StaticLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StaticLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref ChiliCookoffData
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt ChiliCookoffData.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
  
  LambdaExecutionRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'
  
  SetupLambdaArn:
    Description: Setup Lambda function ARN
    Value: !GetAtt SetupLambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SetupLambdaArn'
  
  VoteLambdaArn:
    Description: Vote Lambda function ARN
    Value: !GetAtt VoteLambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-VoteLambdaArn'
  
  LeaderboardLambdaArn:
    Description: Leaderboard Lambda function ARN
    Value: !GetAtt LeaderboardLambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LeaderboardLambdaArn'
  
  StaticLambdaArn:
    Description: Static Lambda function ARN
    Value: !GetAtt StaticLambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StaticLambdaArn'
  
  ALBDNSName:
    Description: Application Load Balancer DNS Name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDNSName'
  
  ALBURL:
    Description: Application Load Balancer URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-ALBURL'
