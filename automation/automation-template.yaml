AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automation infrastructure for Chili Cook-Off Voting App - Deploy and Teardown Lambda Functions'

Parameters:
  SourceCodeBucket:
    Type: String
    Description: S3 bucket containing the application source code and CloudFormation template
    Default: chili-cookoff-automation-source

Resources:
  # IAM Role for Deploy Lambda
  DeployLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ChiliCookoffDeployLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DeployPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation permissions
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/chili-cookoff-voting-app/*'
              
              # S3 permissions for templates and Lambda packages
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${SourceCodeBucket}'
                  - !Sub 'arn:aws:s3:::${SourceCodeBucket}/*'
                  - !Sub 'arn:aws:s3:::chili-cookoff-lambda-packages-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::chili-cookoff-lambda-packages-${AWS::Region}/*'
              
              # Lambda permissions to update functions
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ChiliCookoff*'
              
              # IAM permissions for CloudFormation to create roles
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/ChiliCookoff*'
              
              # DynamoDB permissions
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DescribeTable
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ChiliCookoffData'
              
              # EC2 permissions for VPC resources
              - Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:CreateSubnet
                  - ec2:CreateInternetGateway
                  - ec2:CreateSecurityGroup
                  - ec2:CreateRouteTable
                  - ec2:CreateRoute
                  - ec2:AttachInternetGateway
                  - ec2:AssociateRouteTable
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeRouteTables
                  - ec2:DescribeInternetGateways
                  - ec2:ModifyVpcAttribute
                Resource: '*'
              
              # ELB permissions
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:RegisterTargets
                Resource: '*'

  # IAM Role for Teardown Lambda
  TeardownLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ChiliCookoffTeardownLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TeardownPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation permissions
              - Effect: Allow
                Action:
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/chili-cookoff-voting-app/*'
              
              # S3 permissions to cleanup Lambda packages bucket
              - Effect: Allow
                Action:
                  - s3:DeleteBucket
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub 'arn:aws:s3:::chili-cookoff-lambda-packages-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::chili-cookoff-lambda-packages-${AWS::Region}/*'
              
              # Additional permissions for CloudFormation to delete resources
              - Effect: Allow
                Action:
                  - lambda:DeleteFunction
                  - dynamodb:DeleteTable
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - ec2:DeleteVpc
                  - ec2:DeleteSubnet
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteInternetGateway
                  - ec2:DeleteRouteTable
                  - ec2:DetachInternetGateway
                  - ec2:DisassociateRouteTable
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DeleteListener
                Resource: '*'

  # Deploy Lambda Function
  DeployLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffDeployAutomation
      Runtime: python3.9
      Handler: deploy_lambda.lambda_handler
      Role: !GetAtt DeployLambdaExecutionRole.Arn
      Timeout: 600  # 10 minutes
      MemorySize: 256
      Environment:
        Variables:
          TEMPLATE_S3_BUCKET: !Ref SourceCodeBucket
      Code:
        ZipFile: |
          # Placeholder - will be updated with actual code
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Deploy function not yet configured'
              }

  # Deploy Lambda Function URL
  DeployLambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt DeployLambdaFunction.Arn
      AuthType: NONE
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - '*'

  # Permission for Function URL to invoke Deploy Lambda
  DeployLambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeployLambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # Teardown Lambda Function
  TeardownLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ChiliCookoffTeardownAutomation
      Runtime: python3.9
      Handler: teardown_lambda.lambda_handler
      Role: !GetAtt TeardownLambdaExecutionRole.Arn
      Timeout: 600  # 10 minutes
      MemorySize: 256
      Code:
        ZipFile: |
          # Placeholder - will be updated with actual code
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Teardown function not yet configured'
              }

  # Teardown Lambda Function URL
  TeardownLambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt TeardownLambdaFunction.Arn
      AuthType: NONE
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - '*'

  # Permission for Function URL to invoke Teardown Lambda
  TeardownLambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TeardownLambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  DeployFunctionUrl:
    Description: URL to trigger deployment
    Value: !GetAtt DeployLambdaFunctionUrl.FunctionUrl
    Export:
      Name: ChiliCookoffDeployUrl

  TeardownFunctionUrl:
    Description: URL to trigger teardown
    Value: !GetAtt TeardownLambdaFunctionUrl.FunctionUrl
    Export:
      Name: ChiliCookoffTeardownUrl

  DeployLambdaArn:
    Description: ARN of the Deploy Lambda function
    Value: !GetAtt DeployLambdaFunction.Arn

  TeardownLambdaArn:
    Description: ARN of the Teardown Lambda function
    Value: !GetAtt TeardownLambdaFunction.Arn
